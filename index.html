<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Riya & Trushan Engagement</title>


<!-- Premium Fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">


<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="sparkles"></div>


<!-- ======================
WELCOME ENVELOPE
====================== -->


<section id="welcome">


<div id="envelope">


<div class="envelope-back"></div>


<div class="bottom-fold"></div>


<div class="left-fold"></div>


<div class="right-fold"></div>


<div class="flap"></div>



<div class="letter">

<h2>
Riya ❤️ Trushan
</h2>


<p>
Engagement Invitation
</p>

</div>



<div class="seal">

💍

</div>


</div>



<button id="openBtn">

Tap To Open 💌

</button>



</section>




<!-- ======================
INVITATION CARD
====================== -->


<section id="card">


<div class="invitation">
  <div class="diya">

🪔

</div>
<!-- Floral Decorations -->

<img class="flower top-left" src="flowers/top-left.png">

<img class="flower top-right" src="flowers/top-right.png">

<img class="flower bottom-left" src="flowers/bottom-left.png">

<img class="flower bottom-right" src="flowers/bottom-right.png">


<div class="ganesh reveal-item">

<img src="ganesh.png">

</div>



<h2 class="invite-title reveal-item">

YOU ARE INVITED

</h2>


<h3 class="invite-subtitle reveal-item">

TO THE ENGAGEMENT OF

</h3>



<div class="couple reveal-item">

Riya

<span>&</span>

Trushan

</div>



<div class="rings reveal-item">

💍💍

</div>




<div class="gold-divider"></div>



<div class="date-row reveal-item">


<div class="date-box">

<h4>
JULY
</h4>


<h1>
26
</h1>


<p>
2026
</p>


</div>



<div>


<h3>
SUNDAY
</h3>


<h3>
1:00 PM
</h3>


</div>


</div>





<div class="gold-divider"></div>



<div class="venue reveal-item">


📍 GRAND CELEBRATION VENUE

<br>

gundiya

</div>




<div class="gold-divider"></div>



<p>

With blessings of our families

<br><br>

We request your presence

to celebrate our special day.

</p>


<!-- ACTION BUTTONS -->

<div class="buttons reveal-item">


<a class="gold-btn"
href="https://maps.google.com"
target="_blank">

📍 Location

</a>



<a class="gold-btn"
href="https://wa.me/"
target="_blank">

💬 RSVP

</a>



<button class="gold-btn"
onclick="saveDate()">

📅 Save Date

</button>


</div>



</div>


</section>




<!-- MUSIC -->

<button id="musicBtn">

🎵

</button>


<audio id="music" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>




<script src="script.js"></script>


</body>

</html>
