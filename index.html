<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riya & Trushan</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="welcome">

    <div class="sparkles"></div>

    <h3>Engagement Invitation</h3>

    <h1>Riya <span>❤</span> Trushan</h1>

    <div id="envelope">

        <div class="back"></div>

        <div class="letter">
            <h2>Welcome</h2>
            <p>Tap the Envelope</p>
        </div>

        <div class="front"></div>

        <div class="flap"></div>

    </div>

    <button id="openBtn">
        💌 Tap To Open
    </button>

</div>

<div id="card">

    <img src="invitation.jpg">

</div>

<script src="script.js"></script>

</body>
</html>
